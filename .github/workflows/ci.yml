name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dotnet:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Build .NET
        run: dotnet build --no-restore

      - name: Test .NET
        run: dotnet test --no-build --verbosity normal --filter "TestCategory!=Integration"

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: src/PhotoOrganizer.Web/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: src/PhotoOrganizer.Web
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: src/PhotoOrganizer.Web
        run: pnpm run lint

      - name: Test frontend
        working-directory: src/PhotoOrganizer.Web
        run: pnpm run test

      - name: Build frontend
        working-directory: src/PhotoOrganizer.Web
        run: pnpm run build
